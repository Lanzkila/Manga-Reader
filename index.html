<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirin Manga Reader</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { background: #000; color: #eee; font-family: sans-serif; margin: 0; padding: 0; }
        
        /* Header Nipis & Auto-Hide */
        .header { 
            background: rgba(20, 20, 20, 0.85); 
            padding: 8px 15px; 
            border-bottom: 1px solid #333; 
            position: fixed; 
            top: 0; 
            width: 100%; 
            z-index: 100; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            transition: transform 0.3s ease;
            box-sizing: border-box;
            backdrop-filter: blur(10px);
        }
        .header.hide { transform: translateY(-100%); }
        .header h2 { font-size: 13px; margin: 0; color: #8ab4f8; text-transform: uppercase; letter-spacing: 2px; }

        /* Setup Area */
        #setup { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            padding: 20px;
            box-sizing: border-box;
        }
        .drop-zone { 
            border: 2px dashed #444; 
            padding: 40px; 
            width: 100%; 
            max-width: 400px; 
            border-radius: 15px; 
            text-align: center; 
            cursor: pointer;
            background: #0a0a0a;
            transition: 0.3s;
        }
        .drop-zone:hover { border-color: #8ab4f8; background: #111; }
        
        /* Viewer Area - FULL WIDTH UNTUK DESKTOP */
        #viewer { 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            width: 100%;
        }
        
        #viewer img { 
            width: 100%; /* Desktop akan amik full screen */
            height: auto; 
            display: block;
            margin: 0; /* Rapat terus, tiada gap antara page */
        }
        
        /* RESPONSIVE: Untuk Mobile Maintain Macam Tadi */
        @media screen and (max-width: 768px) {
            #viewer img {
                width: 100%; /* Kat phone pun full lebar skrin dia */
            }
        }

        .btn-small { 
            background: #8ab4f8; 
            color: #000; 
            border: none; 
            padding: 4px 10px; 
            border-radius: 3px; 
            font-size: 10px; 
            font-weight: bold; 
            cursor: pointer; 
        }
        input[type="file"] { display: none; }
        #status { font-size: 12px; color: #8ab4f8; margin-top: 15px; display: none; font-weight: bold; }

        /* Scrollbar Halus */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header" id="mainHeader">
        <h2>Kirin Reader</h2>
        <div id="topControls" style="display:none">
            <button class="btn-small" onclick="location.reload()">NEW FILE</button>
        </div>
    </div>

    <div id="setup">
        <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
            <p style="font-size: 14px; margin: 0;">SELECT MANGA</p>
            <span style="font-size: 11px; color: #666;">Drag .cbz / .zip here</span>
        </div>
        <input type="file" id="fileInput" accept=".zip,.cbz">
        <div id="status">UNZIPPING...</div>
    </div>

    <div id="viewer"></div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const viewer = document.getElementById('viewer');
        const setup = document.getElementById('setup');
        const header = document.getElementById('mainHeader');
        const topControls = document.getElementById('topControls');

        // Logik Auto-Hide Header
        let lastScroll = 0;
        window.addEventListener('scroll', () => {
            const currentScroll = window.pageYOffset;
            if (currentScroll > lastScroll && currentScroll > 60) {
                header.classList.add('hide');
            } else {
                header.classList.remove('hide');
            }
            lastScroll = currentScroll;
        });

        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        async function handleFile(file) {
            if (!file) return;
            status.style.display = 'block';
            document.querySelector('.drop-zone').style.display = 'none';

            try {
                const zip = await JSZip.loadAsync(file);
                const files = [];

                zip.forEach((path, entry) => {
                    // Filter: Hanya imej & bukan fail sampah Mac
                    if (entry.name.match(/\.(jpg|jpeg|png|webp|gif)$/i) && !entry.name.includes('__MACOSX') && !entry.name.startsWith('.')) {
                        files.push(entry);
                    }
                });

                // Sort: Sangat penting supaya page tak lompat (1, 10, 2 jadi 1, 2, 10)
                files.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true, sensitivity: 'base'}));

                for (let fileObj of files) {
                    const blob = await fileObj.async("blob");
                    const img = document.createElement('img');
                    img.src = URL.createObjectURL(blob);
                    img.loading = "lazy";
                    viewer.appendChild(img);
                }

                setup.style.display = 'none';
                topControls.style.display = 'block';
                window.scrollTo(0, 0);

            } catch (err) {
                alert("Error reading file: " + err);
                location.reload();
            }
        }

        // Drag & Drop
        const dropZone = document.querySelector('.drop-zone');
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = '#8ab4f8'; };
        dropZone.ondragleave = () => { dropZone.style.borderColor = '#444'; };
        dropZone.ondrop = (e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); };
    </script>
</body>
</html>
