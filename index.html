<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kirin Manga Reader</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        /* Reset & Lock Horizontal Scroll */
        * { box-sizing: border-box; }
        html, body { 
            margin: 0; 
            padding: 0; 
            background: #000; 
            color: #eee; 
            font-family: sans-serif; 
            overflow-x: hidden; /* Kunci skrin dari goyang kiri-kanan */
            width: 100%;
        }
        
        /* Header Nipis & Auto-Hide */
        .header { 
            background: rgba(20, 20, 20, 0.9); 
            padding: 10px 15px; 
            border-bottom: 1px solid #333; 
            position: fixed; 
            top: 0; 
            width: 100%; 
            z-index: 100; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            transition: transform 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .header.hide { transform: translateY(-100%); }
        .header h2 { font-size: 13px; margin: 0; color: #8ab4f8; text-transform: uppercase; letter-spacing: 2px; }

        /* Setup Area */
        #setup { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            width: 100%;
            padding: 20px;
        }
        .drop-zone { 
            border: 2px dashed #444; 
            padding: 40px; 
            width: 100%; 
            max-width: 400px; 
            border-radius: 15px; 
            text-align: center; 
            background: #0a0a0a;
        }
        
        /* Viewer Area - FIXED 100% WIDTH */
        #viewer { 
            display: flex; 
            flex-direction: column; 
            align-items: center;
            width: 100%;
            margin: 0;
            padding: 0;
        }
        
        #viewer img { 
            width: 100vw; /* Guna Viewport Width supaya ngam dengan skrin HP */
            max-width: 100%; /* Elak dia terkeluar dari container */
            height: auto; 
            display: block;
            margin: 0;
            padding: 0;
            border: none;
        }

        .btn-small { 
            background: #8ab4f8; 
            color: #000; 
            border: none; 
            padding: 5px 12px; 
            border-radius: 4px; 
            font-size: 11px; 
            font-weight: bold; 
        }
        input[type="file"] { display: none; }
        #status { font-size: 12px; color: #8ab4f8; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="header" id="mainHeader">
        <h2>Kirin Reader</h2>
        <div id="topControls" style="display:none">
            <button class="btn-small" onclick="location.reload()">NEW FILE</button>
        </div>
    </div>

    <div id="setup">
        <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
            <p style="font-size: 14px; margin: 0;">SELECT MANGA</p>
            <span style="font-size: 11px; color: #666;">CBZ or ZIP</span>
        </div>
        <input type="file" id="fileInput" accept=".zip,.cbz">
        <div id="status">UNZIPPING...</div>
    </div>

    <div id="viewer"></div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const viewer = document.getElementById('viewer');
        const setup = document.getElementById('setup');
        const header = document.getElementById('mainHeader');
        const topControls = document.getElementById('topControls');

        let lastScroll = 0;
        window.addEventListener('scroll', () => {
            const currentScroll = window.pageYOffset;
            if (currentScroll > lastScroll && currentScroll > 60) {
                header.classList.add('hide');
            } else {
                header.classList.remove('hide');
            }
            lastScroll = currentScroll;
        });

        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        async function handleFile(file) {
            if (!file) return;
            status.style.display = 'block';

            try {
                const zip = await JSZip.loadAsync(file);
                const files = [];

                zip.forEach((path, entry) => {
                    if (entry.name.match(/\.(jpg|jpeg|png|webp|gif)$/i) && !entry.name.includes('__MACOSX')) {
                        files.push(entry);
                    }
                });

                files.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));

                for (let fileObj of files) {
                    const blob = await fileObj.async("blob");
                    const img = document.createElement('img');
                    img.src = URL.createObjectURL(blob);
                    viewer.appendChild(img);
                }

                setup.style.display = 'none';
                topControls.style.display = 'block';
                window.scrollTo(0, 0);

            } catch (err) {
                alert("Error: " + err);
                location.reload();
            }
        }
    </script>
</body>
</html>
