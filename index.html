<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirin Manga Reader (Local)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { background: #121212; color: #eee; font-family: sans-serif; margin: 0; padding: 0; text-align: center; }
        .header { background: #1f1f1f; padding: 15px; border-bottom: 2px solid #8ab4f8; position: sticky; top: 0; z-index: 100; }
        .drop-zone { border: 2px dashed #5f6368; padding: 40px; margin: 20px auto; max-width: 600px; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .drop-zone:hover { border-color: #8ab4f8; background: rgba(138, 180, 248, 0.05); }
        
        #viewer { display: flex; flex-direction: column; align-items: center; gap: 5px; padding-bottom: 50px; }
        #viewer img { max-width: 100%; height: auto; display: block; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        .loading { display: none; color: #8ab4f8; font-weight: bold; margin: 20px; }
        input[type="file"] { display: none; }
        
        .controls { position: fixed; bottom: 20px; right: 20px; display: flex; gap: 10px; }
        .btn { background: #8ab4f8; color: #000; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h2>📖 Kirin Manga Reader</h2>
        <p style="font-size: 12px; color: #8b949e;">Local CBZ/ZIP Reader - No Uploads</p>
    </div>

    <div id="setup">
        <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
            <p>Drag & Drop fail <b>.cbz</b> atau <b>.zip</b> di sini</p>
            <p style="font-size: 13px; color: #8b949e;">Atau klik untuk pilih fail</p>
        </div>
        <input type="file" id="fileInput" accept=".zip,.cbz">
        <div class="loading" id="status">Sedang memproses...</div>
    </div>

    <div id="viewer"></div>

    <div class="controls" id="controls" style="display:none">
        <button class="btn" onclick="location.reload()">TUKAR MANGA</button>
        <button class="btn" onclick="window.scrollTo(0,0)">KE ATAS</button>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const viewer = document.getElementById('viewer');
        const setup = document.getElementById('setup');

        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        async function handleFile(file) {
            if (!file) return;
            
            status.style.display = 'block';
            setup.style.opacity = '0.5';
            viewer.innerHTML = '';

            try {
                const zip = await JSZip.loadAsync(file);
                const files = [];

                // Filter fail gambar sahaja & sort ikut nama
                zip.forEach((relativePath, zipEntry) => {
                    if (zipEntry.name.match(/\.(jpg|jpeg|png|webp|gif)$/i)) {
                        files.push(zipEntry);
                    }
                });

                // Sort files supaya page tak berterabur
                files.sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true, sensitivity: 'base'}));

                if (files.length === 0) throw "Tiada gambar dalam fail ni!";

                // Generate image tags
                for (let fileObj of files) {
                    const blob = await fileObj.async("blob");
                    const img = document.createElement('img');
                    img.src = URL.createObjectURL(blob);
                    img.loading = "lazy"; // Biar ringan sikit browser
                    viewer.appendChild(img);
                }

                // Hide setup UI
                setup.style.display = 'none';
                document.getElementById('controls').style.display = 'flex';

            } catch (err) {
                alert("Ralat: " + err);
                location.reload();
            }
        }

        // Support Drag & Drop
        const dropZone = document.querySelector('.drop-zone');
        dropZone.ondragover = (e) => { e.preventDefault(); };
        dropZone.ondrop = (e) => {
            e.preventDefault();
            handleFile(e.dataTransfer.files[0]);
        };
    </script>
</body>
</html>
